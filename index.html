<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中坦达资 | HOME PAGE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  
  <style>
    /* Custom styles for the two-button arrangement on index */
    .button-container {
        display: flex;
        justify-content: center;
        gap: 40px;
        padding: 60px 0;
        background: var(--navy);
    }
    .btn-large {
        min-width: 200px;
        font-size: 1.2rem !important;
        font-weight: bold;
        text-transform: uppercase;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="container flex">
    <div class="logo">
        <img src="images/logo.png" alt="中坦达资logo">
        <h2>中坦达资</h2>
    </div>

    <nav>
      <a href="index.html" data-en="Home" data-zh="首页"></a>
      <a href="services.html" data-en="Services" data-zh="服务"></a>
      <a href="tanzania.html" data-en="Tanzania" data-zh="坦桑尼亚"></a>
      <a href="contact.html" data-en="Contact Us" data-zh="联系我们"></a>
      <button id="langToggle">中文</button>
    </nav>

     <button id="hamburger">☰</button>
  </div>

  <div id="mobileMenu" class="mobile-menu">
    <div class="mobile-content">
      <span class="close-menu" onclick="closeMenu()">×</span>
      <nav class="mobile-nav">
        <a href="index.html" data-en="Home" data-zh="首页" onclick="closeMenu()"></a>
        <a href="services.html" data-en="Services" data-zh="服务" onclick="closeMenu()"></a>
        <a href="tanzania.html" data-en="Tanzania" data-zh="坦桑尼亚" onclick="closeMenu()"></a>
        <a href="contact.html" data-en="Contact Us" data-zh="联系我们" onclick="closeMenu()"></a>
      </nav>
      <button id="langToggleMobile">中文</button>
    </div>
  </div>  
</header>

<section id="home" class="hero">
  <div class="overlay">
    <h1 style="font-size: 4rem; margin: 20px 70px;" 
        data-en="PROFESSIONAL CONSULTANCY FOR CHINESE CITIZENS IN TANZANIA"
        data-zh="为在坦桑尼亚的中国公民提供专业咨询服务"></h1>
<hr style="width:70%; margin-bottom:20px">
    <p style="font-size: 1.5rem;"
       data-en="Legal, tax, and business solutions built for serious investors."
       data-zh="为严肃投资者提供法律、税务和商业解决方案。"></p>
  </div>
</section>

<section id="stats" class="section dark">
  <div class="container grid">
    <div class="stat">
      <h2 class="counter" data-target="169">0</h2>
      <p data-en="Clients Assisted" data-zh="服务客户"></p>
    </div>

    <div class="stat">
      <h2 class="counter" data-target="87">0</h2>
      <p data-en="Companies Registered" data-zh="注册公司"></p>
    </div>

    <div class="stat">
      <h2 class="counter" data-target="2">0</h2>
      <p data-en="Years Experience" data-zh="经验年数"></p>
    </div>
  </div>
</section>

<section class="button-container">
    <a href="services.html" class="btn btn-large" 
       data-en="Our Services" 
       data-zh="我们的服务"></a>
       
    <a href="contact.html" class="btn btn-large" 
       data-en="Send Message" 
       data-zh="发送信息"></a>
</section>

<footer class="footer">
  <p>
    <a href="#" onclick="openTerms()" data-en="Terms & Conditions" data-zh="条款和条件">Terms & Conditions</a> |
    <a href="#" onclick="openPrivacy()" data-en="Privacy Policy" data-zh="隐私政策">Privacy Policy</a>
  </p>
   <p>Dar es Salaam, Tanzania  ©️ 2026 中坦达资</p>
</footer>

<div id="termsPopup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closeTerms()">×</span>
    <h3>Terms & Conditions</h3>
    <p>This company is a private consultancy firm...</p>
  </div>
</div>

<div id="privacyPopup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePrivacy()">×</span>
    <h3>Privacy Policy</h3>
    <p>We collect client information only for service delivery...</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
